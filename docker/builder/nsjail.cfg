# nsjail sandbox config for the Appio builder.
#
# Goal: run `node /build/base/esbuild.config.mjs` with:
#   - no network access
#   - /workspace mounted read-write (the only writable path)
#   - /build mounted read-only (esbuild config + node_modules)
#   - hard memory / CPU / PID / runtime caps
#
# This is a textproto config consumed by `nsjail --config <file>`.

mode: ONCE
hostname: "appio-builder"
cwd: "/workspace"
time_limit: 60

uidmap { inside_id: "1000" outside_id: "1000" count: 1 }
gidmap { inside_id: "1000" outside_id: "1000" count: 1 }

# --- Resource limits ---
rlimit_as:    1024     # 1 GB virtual memory
rlimit_cpu:   60       # 60 seconds CPU time
rlimit_fsize: 50       # 50 MB max output file size (esbuild + sourcemaps)
rlimit_nofile: 256
rlimit_nproc:  64
rlimit_stack:  16

# --- Filesystem ---
# Read-only system paths
mount { src: "/bin"           dst: "/bin"           is_bind: true rw: false }
mount { src: "/lib"           dst: "/lib"           is_bind: true rw: false }
mount { src: "/lib64"         dst: "/lib64"         is_bind: true rw: false mandatory: false }
mount { src: "/usr"           dst: "/usr"           is_bind: true rw: false }
mount { src: "/etc/ssl"       dst: "/etc/ssl"       is_bind: true rw: false mandatory: false }
mount { src: "/etc/ca-certificates" dst: "/etc/ca-certificates" is_bind: true rw: false mandatory: false }

# Pre-installed builder image: node_modules, esbuild config, base template
mount { src: "/build"         dst: "/build"         is_bind: true rw: false }

# Per-build scratch — the only writable mount.
mount { src: "/workspace"     dst: "/workspace"     is_bind: true rw: true }

# tmpfs for /tmp so esbuild can write its scratch files
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=64m"
}

# /dev/null + /dev/urandom only — no /dev/net, no /dev/kvm
mount { src: "/dev/null"     dst: "/dev/null"     is_bind: true rw: true }
mount { src: "/dev/urandom"  dst: "/dev/urandom"  is_bind: true rw: false }
mount { src: "/dev/zero"     dst: "/dev/zero"     is_bind: true rw: false }

# --- Namespaces ---
clone_newnet: true   # No network namespace inheritance → no network
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true
clone_newuser: true
clone_newns: true

# --- Misc hardening ---
keep_caps: false
disable_no_new_privs: false
skip_setsid: false
