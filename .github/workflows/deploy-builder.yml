name: Deploy Builder

on:
  push:
    branches: [main, master]
    paths:
      - "docker/builder/**"
      - "packages/templates/base/**"
      - ".github/workflows/deploy-builder.yml"
  workflow_dispatch:

concurrency:
  group: deploy-builder-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy builder to Fly.io Machines
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Fly deploy
        working-directory: docker/builder
        run: flyctl deploy --remote-only --config fly.toml --dockerfile Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
