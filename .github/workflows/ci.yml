name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  js-lint-build:
    name: JS Lint, Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Type-check
        run: npx turbo run type-check
      - name: Lint
        run: npx turbo run lint
      - name: Build
        run: npx turbo run build
      - name: Audit (moderate+)
        run: npm audit --audit-level=moderate

  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        # codegen/ is deprecated (Agent-Only Architecture v6) and omitted.
        run: pip install -e python/shared -e python/db -e python/builder -e "apps/api[dev]"
      - name: Lint
        run: ruff check apps/api/ python/
      - name: Type check
        run: mypy apps/api/ python/ --ignore-missing-imports
      - name: Test
        run: pytest apps/api/tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/appio_test
          REDIS_URL: redis://localhost:6379/0
