name: Deploy API

on:
  push:
    branches: [main, master]
    paths:
      - "apps/api/**"
      - "python/**"
      - "docker/Dockerfile.api"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-api-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io (${{ github.event.inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run Alembic migrations
        run: |
          pip install alembic asyncpg psycopg2-binary sqlalchemy "pydantic-settings>=2.7.0"
          pip install -e python/shared -e python/db
          alembic -c python/db/alembic.ini upgrade head
        env:
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}

      - name: Fly deploy
        run: flyctl deploy --remote-only --config apps/api/fly.toml --dockerfile docker/Dockerfile.api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "${API_URL}/health"; then exit 0; fi
            sleep 5
          done
          exit 1
        env:
          API_URL: ${{ vars.API_URL }}
